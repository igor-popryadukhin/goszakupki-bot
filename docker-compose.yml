services:
  ollama:
    image: ollama/ollama:latest
    container_name: purchases-ollama
    ports:
      - "${OLLAMA_PUBLISH_PORT:-11434}:11434"
    volumes:
      - ./ollama:/root/.ollama
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "ollama", "list"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 20s

  purchases-bot:
    build: .
    container_name: purchases-bot
    depends_on:
      ollama:
        condition: service_healthy
    environment:
      TELEGRAM_BOT_TOKEN: ${TELEGRAM_BOT_TOKEN}
      SOURCE_IDS: ${SOURCE_IDS:-goszakupki.by,icetrade.by}
      SOURCE_PAGES_DEFAULT: ${SOURCE_PAGES_DEFAULT:-3}
      CHECK_INTERVAL_DEFAULT: ${CHECK_INTERVAL_DEFAULT:-300}
      HTTP_TIMEOUT_SECONDS: ${HTTP_TIMEOUT_SECONDS:-30}
      HTTP_CONCURRENCY: ${HTTP_CONCURRENCY:-3}
      RATE_LIMIT_RPS: ${RATE_LIMIT_RPS:-2}
      HTTP_VERIFY_SSL: ${HTTP_VERIFY_SSL:-0}
      # Detail scanner config
      DETAIL_INTERVAL_SECONDS: ${DETAIL_INTERVAL_SECONDS:-3}
      DETAIL_MAX_RETRIES: ${DETAIL_MAX_RETRIES:-5}
      DETAIL_BACKOFF_BASE_SECONDS: ${DETAIL_BACKOFF_BASE_SECONDS:-60}
      DETAIL_BACKOFF_FACTOR: ${DETAIL_BACKOFF_FACTOR:-2.0}
      DETAIL_BACKOFF_MAX_SECONDS: ${DETAIL_BACKOFF_MAX_SECONDS:-3600}
      DB_PATH: /data/app.db
      TZ: Europe/Helsinki
      LOG_LEVEL: ${LOG_LEVEL:-DEBUG}
      GZ_LIST_ITEM: ${GZ_LIST_ITEM}
      GZ_TITLE: ${GZ_TITLE}
      GZ_LINK: ${GZ_LINK}
      GZ_ID_TEXT: ${GZ_ID_TEXT}
      GZ_ID_FROM_HREF: ${GZ_ID_FROM_HREF:-0}
      USE_PLAYWRIGHT: ${USE_PLAYWRIGHT:-0}
      # Auth gate (optional). When set, bot requires /login
      AUTH_LOGIN: ${AUTH_LOGIN}
      AUTH_PASSWORD: ${AUTH_PASSWORD}

      OLLAMA_HOST: ${OLLAMA_HOST:-http://ollama}
      OLLAMA_PORT: ${OLLAMA_PORT:-11434}
      OLLAMA_EMBEDDING_MODEL: ${OLLAMA_EMBEDDING_MODEL:-qwen3-embedding:4b}
      OLLAMA_TIMEOUT_SECONDS: ${OLLAMA_TIMEOUT_SECONDS:-30}
      OLLAMA_MAX_CONCURRENCY: ${OLLAMA_MAX_CONCURRENCY:-2}
      ANALYSIS_SEMANTIC_ENABLED: ${ANALYSIS_SEMANTIC_ENABLED:-1}
      ANALYSIS_SEMANTIC_THRESHOLD: ${ANALYSIS_SEMANTIC_THRESHOLD:-0.84}
      ANALYSIS_SEMANTIC_REVIEW_THRESHOLD: ${ANALYSIS_SEMANTIC_REVIEW_THRESHOLD:-0.72}
      ANALYSIS_SEMANTIC_TOP_N: ${ANALYSIS_SEMANTIC_TOP_N:-5}
      ANALYSIS_EMBEDDING_CACHE_ENABLED: ${ANALYSIS_EMBEDDING_CACHE_ENABLED:-1}
      ANALYSIS_VERSION: ${ANALYSIS_VERSION:-1}
      ANALYSIS_QUEUE_LIMIT: ${ANALYSIS_QUEUE_LIMIT:-1000}
      ANALYSIS_PARALLELISM: ${ANALYSIS_PARALLELISM:-2}
      ANALYSIS_LLM_RESOLVER_ENABLED: ${ANALYSIS_LLM_RESOLVER_ENABLED:-0}

      DEEPSEEK_API_KEY: ${DEEPSEEK_API_KEY}
      DEEPSEEK_ENABLED: 1
      DEEPSEEK_MODEL: deepseek-chat
      DEEPSEEK_MIN_SCORE: 0.6
      DEEPSEEK_BALANCE_CHECK_ENABLED: ${DEEPSEEK_BALANCE_CHECK_ENABLED:-1}
      DEEPSEEK_BALANCE_CHECK_INTERVAL_SECONDS: ${DEEPSEEK_BALANCE_CHECK_INTERVAL_SECONDS:-86400}
      DEEPSEEK_BALANCE_LOW_THRESHOLD: ${DEEPSEEK_BALANCE_LOW_THRESHOLD:-5}
    volumes:
      - ./data:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import os,sqlite3,sys; p=os.getenv('DB_PATH','/data/app.db'); con=sqlite3.connect(p); con.execute('PRAGMA quick_check'); con.close()\""]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s
