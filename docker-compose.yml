services:
  purchases-bot:
    build: .
    container_name: purchases-bot
    environment:
      TELEGRAM_BOT_TOKEN:
      SOURCE_ID: goszakupki.by
      SOURCE_BASE_URL: https://goszakupki.by/tenders/posted
      SOURCE_PAGES_DEFAULT: ${SOURCE_PAGES_DEFAULT:-2}
      CHECK_INTERVAL_DEFAULT: ${CHECK_INTERVAL_DEFAULT:-300}
      HTTP_TIMEOUT_SECONDS: ${HTTP_TIMEOUT_SECONDS:-10}
      HTTP_CONCURRENCY: ${HTTP_CONCURRENCY:-3}
      RATE_LIMIT_RPS: ${RATE_LIMIT_RPS:-2.0}
      HTTP_VERIFY_SSL: ${HTTP_VERIFY_SSL:-0}
      # Detail scanner config
      DETAIL_INTERVAL_SECONDS: ${DETAIL_INTERVAL_SECONDS:-10}
      DETAIL_MAX_RETRIES: ${DETAIL_MAX_RETRIES:-5}
      DETAIL_BACKOFF_BASE_SECONDS: ${DETAIL_BACKOFF_BASE_SECONDS:-60}
      DETAIL_BACKOFF_FACTOR: ${DETAIL_BACKOFF_FACTOR:-2.0}
      DETAIL_BACKOFF_MAX_SECONDS: ${DETAIL_BACKOFF_MAX_SECONDS:-3600}
      DB_PATH: /data/app.db
      TZ: Europe/Helsinki
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
      GZ_LIST_ITEM: ${GZ_LIST_ITEM:-.tenders-list .tender-card}
      GZ_TITLE: ${GZ_TITLE:-.tender-card__title}
      GZ_LINK: ${GZ_LINK:-.tender-card__title a}
      GZ_ID_TEXT:
      GZ_ID_FROM_HREF: ${GZ_ID_FROM_HREF:-false}
      GZ_PREFER_TABLE: ${GZ_PREFER_TABLE:-true}
      GZ_DETAIL_MAIN:
      GZ_DETAIL_TEXT_SELECTORS:
      GZ_DETAIL_EXCLUDE:
      USE_PLAYWRIGHT: ${USE_PLAYWRIGHT:-0}
      # Auth gate (optional). When set, bot requires /login
      AUTH_LOGIN:
      AUTH_PASSWORD:

      DEEPSEEK_API_KEY:
      DEEPSEEK_ENABLED:
      DEEPSEEK_MODEL: ${DEEPSEEK_MODEL:-deepseek-chat}
      DEEPSEEK_MIN_SCORE: ${DEEPSEEK_MIN_SCORE:-0.6}
      DEEPSEEK_TIMEOUT_SECONDS: ${DEEPSEEK_TIMEOUT_SECONDS:-15.0}
      DEEPSEEK_MAX_CHARS: ${DEEPSEEK_MAX_CHARS:-6000}
      DEEPSEEK_MAX_KEYWORDS: ${DEEPSEEK_MAX_KEYWORDS:-25}
      DEEPSEEK_BASE_URL: ${DEEPSEEK_BASE_URL:-https://api.deepseek.com}
      DEEPSEEK_BALANCE_CHECK_ENABLED:
      DEEPSEEK_BALANCE_CHECK_INTERVAL_SECONDS: ${DEEPSEEK_BALANCE_CHECK_INTERVAL_SECONDS:-86400}
      DEEPSEEK_BALANCE_LOW_THRESHOLD: ${DEEPSEEK_BALANCE_LOW_THRESHOLD:-5.0}
    volumes:
      - ./data:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import os,sqlite3,sys; p=os.getenv('DB_PATH','/data/app.db'); con=sqlite3.connect(p); con.execute('PRAGMA quick_check'); con.close()\""]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s
